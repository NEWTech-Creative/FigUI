<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI to G-code</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0 }
body {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.header {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 10px;
}
.header h1 { font-size: 14px; font-weight: 600 }
.split {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.panel-left {
  width: 250px;
  min-width: 200px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  flex-shrink: 0;
}
.panel-right {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: block;
}
.param-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.param-row label {
  width: 80px;
  flex-shrink: 0;
  color: var(--text-muted);
  font-size: 12px;
}
input[type=number], input[type=text] {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: 4px;
  padding: 4px 6px;
  font-size: 12px;
  width: 64px;
  -moz-appearance: textfield;
}
input[type=number]::-webkit-inner-spin-button { opacity: 0.5 }
input[type=text] { width: 100% }
.unit { color: var(--text-dim); font-size: 11px; flex-shrink: 0 }
.check-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
  cursor: pointer;
  user-select: none;
}
.check-row span { font-size: 12px; color: var(--text-muted) }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, opacity 0.12s;
  white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff }
.btn-primary:hover { background: var(--accent-hover) }
.btn-primary:disabled { opacity: 0.4; cursor: default }
.btn-secondary {
  background: var(--surface);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--elevated) }
.btn-secondary:disabled { opacity: 0.4; cursor: default }
.upload-zone {
  border: 1.5px dashed var(--border-strong);
  border-radius: 8px;
  padding: 20px 14px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: var(--text-muted);
  font-size: 12px;
  line-height: 1.5;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(var(--accent-rgb), 0.06);
}
.upload-zone.has-file {
  border-color: var(--ok);
  background: rgba(var(--ok-rgb), 0.06);
  color: var(--ok);
}
.upload-zone input { display: none }
.status-bar {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  flex-shrink: 0;
}
.status-bar.ok { border-color: var(--ok); color: var(--ok) }
.status-bar.error { border-color: var(--danger); color: var(--danger) }
.status-bar.info { border-color: var(--accent); color: var(--accent) }
.output-preview {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  overflow-y: auto;
  white-space: pre;
  color: var(--text-muted);
  flex: 1;
  min-height: 180px;
  max-height: 320px;
}
.save-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.save-row input[type=text] { flex: 1; width: auto }
.actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap }
.settings-row { display: flex; gap: 6px }
.settings-row .btn { flex: 1; font-size: 12px; padding: 6px 8px }
</style>
</head>
<body>

<div class="header">
  <h1>MIDI to G-code Music</h1>
</div>

<div class="split">
  <div class="panel-left">

    <div>
      <span class="section-label">Steps per mm</span>
      <div class="param-row">
        <label>X</label>
        <input type="number" id="stepsX" value="320" min="1" step="any">
        <span class="unit">st/mm</span>
      </div>
      <div class="param-row">
        <label>Y</label>
        <input type="number" id="stepsY" value="400" min="1" step="any">
        <span class="unit">st/mm</span>
      </div>
      <div class="param-row">
        <label>Z</label>
        <input type="number" id="stepsZ" value="320" min="1" step="any">
        <span class="unit">st/mm</span>
      </div>
    </div>

    <div>
      <span class="section-label">Travel limits</span>
      <div class="param-row">
        <label>X</label>
        <input type="number" id="travelX" value="318" min="1" step="any">
        <span class="unit">mm</span>
      </div>
      <div class="param-row">
        <label>Y</label>
        <input type="number" id="travelY" value="380" min="1" step="any">
        <span class="unit">mm</span>
      </div>
      <div class="param-row">
        <label>Z</label>
        <input type="number" id="travelZ" value="55" min="1" step="any">
        <span class="unit">mm</span>
      </div>
    </div>

    <div>
      <span class="section-label">Constraints</span>
      <div class="param-row">
        <label>Safety</label>
        <input type="number" id="safetyMM" value="5" min="0" step="0.5">
        <span class="unit">mm</span>
      </div>
      <div class="param-row">
        <label>Max feed</label>
        <input type="number" id="maxFeed" value="15000" min="100" step="100" style="width:72px">
        <span class="unit">mm/min</span>
      </div>
    </div>

    <div>
      <span class="section-label">Options</span>
      <label class="check-row">
        <input type="checkbox" id="autoTranspose" checked>
        <span>Auto-transpose down octaves</span>
      </label>
      <label class="check-row">
        <input type="checkbox" id="ignorePerc" checked>
        <span>Ignore percussion (ch 10)</span>
      </label>
      <label class="check-row">
        <input type="checkbox" id="useZ">
        <span>Use Z axis (limited travel)</span>
      </label>
    </div>

    <div class="settings-row">
      <button class="btn btn-secondary" onclick="loadSettings()">Load settings</button>
      <button class="btn btn-secondary" onclick="saveSettingsToDevice()">Save settings</button>
    </div>

  </div>

  <div class="panel-right">

    <div>
      <span class="section-label">MIDI File</span>
      <div class="upload-zone" id="uploadZone"
        onclick="document.getElementById('fileInput').click()"
        ondragover="onDragOver(event)"
        ondrop="onDrop(event)"
        ondragleave="onDragLeave(event)">
        <input type="file" id="fileInput" accept=".mid,.midi" onchange="onFileSelected(event)">
        <span id="uploadLabel">Click to choose a .mid / .midi file, or drag and drop</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="convertBtn" onclick="convert()" disabled>Convert to G-code</button>
    </div>

    <div id="statusBar" class="status-bar">Ready — choose a MIDI file to begin.</div>

    <div style="display:flex;flex-direction:column;flex:1;gap:6px">
      <span class="section-label" style="margin-bottom:0">Preview (first 200 lines)</span>
      <div class="output-preview" id="outputPreview">No output yet.</div>
    </div>

    <div>
      <span class="section-label">Save G-code to device</span>
      <div class="save-row">
        <input type="text" id="saveName" value="music.nc" placeholder="filename.nc">
        <button class="btn btn-secondary" id="saveIntBtn" onclick="saveToDevice('local')" disabled>Internal</button>
        <button class="btn btn-secondary" id="saveSDBtn" onclick="saveToDevice('sd')" disabled>SD Card</button>
      </div>
    </div>

  </div>
</div>

<script>
let msgId = 0
const pending = {}

function call(method, params) {
  return new Promise((resolve, reject) => {
    const id = String(++msgId)
    pending[id] = { resolve, reject }
    window.parent.postMessage({ type: 'fluid-request', id, method, params: params ?? {} }, '*')
  })
}

window.addEventListener('message', e => {
  if (e.data?.type === 'fluid-response') {
    const p = pending[e.data.id]
    if (p) {
      delete pending[e.data.id]
      e.data.error ? p.reject(new Error(e.data.error)) : p.resolve(e.data.result)
    }
  }
  if (e.data?.type === 'fluid-theme') {
    for (const [k, v] of Object.entries(e.data.vars ?? {}))
      document.documentElement.style.setProperty(k, v)
  }
})

// ---- MIDI parser ----

function parseMidi(buffer) {
  const bytes = new Uint8Array(buffer)
  let pos = 0

  const read1 = () => bytes[pos++]
  const read2 = () => { const v = (bytes[pos] << 8) | bytes[pos + 1]; pos += 2; return v }
  const read4 = () => { const v = ((bytes[pos] << 24) | (bytes[pos+1] << 16) | (bytes[pos+2] << 8) | bytes[pos+3]) >>> 0; pos += 4; return v }
  const readStr = n => { const s = String.fromCharCode(...bytes.slice(pos, pos + n)); pos += n; return s }
  const readVlq = () => { let v = 0, b; do { b = read1(); v = (v << 7) | (b & 0x7F) } while (b & 0x80); return v }

  if (readStr(4) !== 'MThd') throw new Error('Not a valid MIDI file')
  read4()
  read2()
  const nTracks = read2()
  const division = read2()
  if (division & 0x8000) throw new Error('SMPTE time division not supported')
  const ticksPerBeat = division

  const tracks = []
  for (let t = 0; t < nTracks; t++) {
    if (readStr(4) !== 'MTrk') throw new Error('Expected MTrk chunk')
    const trackLen = read4()
    const trackEnd = pos + trackLen
    const events = []
    let tick = 0
    let rs = 0

    while (pos < trackEnd) {
      const delta = readVlq()
      tick += delta
      let sb = bytes[pos]

      if (sb === 0xFF) {
        pos++; rs = 0
        const mt = read1()
        const ml = readVlq()
        if (mt === 0x51 && ml === 3) {
          const tempo = (read1() << 16) | (read1() << 8) | read1()
          events.push({ tick, type: 'tempo', tempo, pri: 0 })
        } else {
          pos += ml
        }
      } else if (sb === 0xF0 || sb === 0xF7) {
        pos++; rs = 0
        pos += readVlq()
      } else {
        if (sb & 0x80) { rs = sb; pos++ } else { sb = rs }
        const type = sb & 0xF0
        const ch = sb & 0x0F
        if (type === 0x80) {
          const note = read1(); read1()
          events.push({ tick, type: 'off', ch, note, pri: 1 })
        } else if (type === 0x90) {
          const note = read1(), vel = read1()
          events.push({ tick, type: vel > 0 ? 'on' : 'off', ch, note, pri: 1 })
        } else if (type === 0xA0 || type === 0xB0 || type === 0xE0) {
          pos += 2
        } else if (type === 0xC0 || type === 0xD0) {
          pos += 1
        } else {
          pos++
        }
      }
    }
    pos = trackEnd
    tracks.push(events)
  }

  return { ticksPerBeat, tracks }
}

function mergeEvents(tracks) {
  const all = tracks.flat()
  all.sort((a, b) => a.tick !== b.tick ? a.tick - b.tick : a.pri - b.pri)
  return all
}

function generateGcode(merged, ticksPerBeat, p) {
  const AXES = p.useZ ? ['X', 'Y', 'Z'] : ['X', 'Y']
  const steps = { X: p.stepsX, Y: p.stepsY, Z: p.stepsZ }
  const travel = { X: p.travelX, Y: p.travelY, Z: p.travelZ }

  const pos = { X: p.safetyMM, Y: p.safetyMM, Z: p.safetyMM }
  const dir = { X: 1, Y: 1, Z: 1 }
  let tempo = 500000
  const active = new Set()
  const lines = []

  const noteHz = n => 440.0 * Math.pow(2, (n - 69) / 12.0)
  const axisFeed = (ax, n) => 60.0 * noteHz(n) / steps[ax]

  function transposeToFit(nxyz) {
    if (!p.autoTranspose) return nxyz
    const out = { ...nxyz }
    let changed = true
    while (changed) {
      changed = false
      for (const ax of AXES) {
        let n = out[ax]
        if (n === null) continue
        while (n >= 12 && axisFeed(ax, n) > p.maxFeed) { n -= 12; changed = true }
        out[ax] = n
      }
    }
    return out
  }

  function emitSpan(dtSec) {
    if (dtSec <= 0) return

    const sorted = [...active].sort((a, b) => b - a)
    let nxyz = {}
    AXES.forEach(ax => { nxyz[ax] = null })
    sorted.slice(0, AXES.length).forEach((n, i) => { nxyz[AXES[i]] = n })
    nxyz = transposeToFit(nxyz)

    const moving = AXES.filter(ax => nxyz[ax] !== null)
    if (!moving.length) { lines.push(`G4 P${dtSec.toFixed(4)}`); return }

    const feed = {}
    for (const ax of moving) {
      let f = axisFeed(ax, nxyz[ax])
      if (f > p.maxFeed) f = p.maxFeed
      feed[ax] = f
    }

    // Combined feedrate for simultaneous multi-axis move.
    // sqrt(sum of squares) preserves each axis's individual step rate.
    let combinedFeed = Math.sqrt(moving.reduce((s, ax) => s + feed[ax] ** 2, 0))
    if (combinedFeed > p.maxFeed) {
      const scale = p.maxFeed / combinedFeed
      for (const ax of moving) feed[ax] *= scale
      combinedFeed = p.maxFeed
    }

    let remaining = dtSec

    while (remaining > 0.001) {
      for (const ax of moving) {
        if (pos[ax] <= p.safetyMM + 0.001) dir[ax] = 1
        else if (pos[ax] >= travel[ax] - p.safetyMM - 0.001) dir[ax] = -1
      }

      let tStep = remaining
      for (const ax of moving) {
        const v = feed[ax] / 60.0
        const boundary = dir[ax] > 0 ? travel[ax] - p.safetyMM : p.safetyMM
        const gap = Math.abs(boundary - pos[ax])
        if (gap > 0.001) tStep = Math.min(tStep, gap / v)
      }

      let cmd = 'G1'
      for (const ax of moving) {
        pos[ax] = Math.max(p.safetyMM, Math.min(travel[ax] - p.safetyMM,
          pos[ax] + dir[ax] * (feed[ax] / 60.0) * tStep))
        cmd += ` ${ax}${pos[ax].toFixed(3)}`
      }
      cmd += ` F${combinedFeed.toFixed(3)}`
      lines.push(cmd)

      remaining -= tStep
    }
  }

  lines.push('; MIDI to FluidNC G-code music')
  lines.push(`; Steps/mm X=${p.stepsX} Y=${p.stepsY} Z=${p.stepsZ}`)
  lines.push(`; Travel mm X=${p.travelX} Y=${p.travelY} Z=${p.travelZ}`)
  lines.push(`; Safety ${p.safetyMM}mm  MaxFeed ${p.maxFeed}mm/min`)
  lines.push('G21')
  lines.push('G90')
  lines.push('G94')
  lines.push('M5')
  lines.push(`G0 X${pos.X.toFixed(3)} Y${pos.Y.toFixed(3)} Z${pos.Z.toFixed(3)}`)

  let prevTick = 0
  for (const ev of merged) {
    const dt = ev.tick - prevTick
    if (dt > 0) emitSpan((dt * tempo) / (ticksPerBeat * 1e6))
    prevTick = ev.tick

    if (ev.type === 'tempo') {
      tempo = ev.tempo
    } else if (ev.type === 'on') {
      if (!(p.ignorePerc && ev.ch === 9)) active.add(ev.note)
    } else if (ev.type === 'off') {
      if (!(p.ignorePerc && ev.ch === 9)) active.delete(ev.note)
    }
  }

  lines.push(`G0 X${pos.X.toFixed(3)} Y${pos.Y.toFixed(3)} Z${pos.Z.toFixed(3)}`)
  lines.push('M30')

  return lines.join('\n')
}

let midiFile = null
let gcodeOutput = null

function getParams() {
  return {
    stepsX: +document.getElementById('stepsX').value,
    stepsY: +document.getElementById('stepsY').value,
    stepsZ: +document.getElementById('stepsZ').value,
    travelX: +document.getElementById('travelX').value,
    travelY: +document.getElementById('travelY').value,
    travelZ: +document.getElementById('travelZ').value,
    safetyMM: +document.getElementById('safetyMM').value,
    maxFeed: +document.getElementById('maxFeed').value,
    autoTranspose: document.getElementById('autoTranspose').checked,
    ignorePerc: document.getElementById('ignorePerc').checked,
    useZ: document.getElementById('useZ').checked,
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('statusBar')
  el.textContent = msg
  el.className = 'status-bar' + (cls ? ' ' + cls : '')
}

function onDragOver(e) {
  e.preventDefault()
  document.getElementById('uploadZone').classList.add('drag-over')
}
function onDragLeave() {
  document.getElementById('uploadZone').classList.remove('drag-over')
}
function onDrop(e) {
  e.preventDefault()
  document.getElementById('uploadZone').classList.remove('drag-over')
  const f = e.dataTransfer.files[0]
  if (f) loadFile(f)
}
function onFileSelected(e) {
  const f = e.target.files[0]
  if (f) loadFile(f)
}

function loadFile(f) {
  midiFile = f
  gcodeOutput = null
  document.getElementById('uploadLabel').textContent = `${f.name}  (${(f.size / 1024).toFixed(1)} KB)`
  document.getElementById('uploadZone').classList.add('has-file')
  document.getElementById('convertBtn').disabled = false
  document.getElementById('saveIntBtn').disabled = true
  document.getElementById('saveSDBtn').disabled = true
  document.getElementById('outputPreview').textContent = 'No output yet.'
  document.getElementById('saveName').value = f.name.replace(/\.(mid|midi)$/i, '') + '.nc'
  setStatus(`Loaded ${f.name} — click Convert to generate G-code.`, 'info')
}

async function convert() {
  if (!midiFile) return
  document.getElementById('convertBtn').disabled = true
  setStatus('Parsing MIDI...', 'info')

  try {
    const buf = await midiFile.arrayBuffer()
    const midi = parseMidi(buf)
    const merged = mergeEvents(midi.tracks)

    setStatus('Generating G-code...', 'info')
    await new Promise(r => setTimeout(r, 10))

    const gcode = generateGcode(merged, midi.ticksPerBeat, getParams())
    gcodeOutput = gcode

    const lines = gcode.split('\n')
    document.getElementById('outputPreview').textContent =
      lines.slice(0, 200).join('\n') + (lines.length > 200 ? `\n\n... (${lines.length - 200} more lines)` : '')

    document.getElementById('saveIntBtn').disabled = false
    document.getElementById('saveSDBtn').disabled = false
    setStatus(`Done — ${lines.length.toLocaleString()} lines, ${(gcodeOutput.length / 1024).toFixed(1)} KB`, 'ok')
  } catch (err) {
    setStatus('Error: ' + err.message, 'error')
  } finally {
    document.getElementById('convertBtn').disabled = false
  }
}

async function saveToDevice(fs) {
  if (!gcodeOutput) return
  const name = document.getElementById('saveName').value.trim() || 'music.nc'
  const path = (fs === 'sd' ? '/sd/' : '/') + name
  setStatus(`Saving to ${path}…`, 'info')
  try {
    await call('writeFile', { path, content: gcodeOutput, fs })
    setStatus(`Saved → ${path}`, 'ok')
  } catch (err) {
    setStatus('Save failed: ' + err.message, 'error')
  }
}

async function saveSettingsToDevice() {
  try {
    await call('saveSettings', { data: getParams() })
    setStatus('Settings saved.', 'ok')
  } catch (err) {
    setStatus('Could not save settings: ' + err.message, 'error')
  }
}

async function loadSettings() {
  try {
    const data = await call('getSettings', {})
    if (!data || !Object.keys(data).length) return
    const nums = ['stepsX','stepsY','stepsZ','travelX','travelY','travelZ','safetyMM','maxFeed']
    nums.forEach(k => { if (data[k] !== undefined) document.getElementById(k).value = data[k] })
    if (data.autoTranspose !== undefined) document.getElementById('autoTranspose').checked = data.autoTranspose
    if (data.ignorePerc !== undefined) document.getElementById('ignorePerc').checked = data.ignorePerc
    if (data.useZ !== undefined) document.getElementById('useZ').checked = data.useZ
  } catch {}
}

loadSettings()
</script>
</body>
</html>
