name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Bump version in source
        run: |
          sed -i "s/const CURRENT_VERSION = '[^']*'/const CURRENT_VERSION = '${{ github.event.inputs.version }}'/" src/components/AboutModal.tsx

      - name: Install dependencies
        run: npm install

      - name: Build ESP32 firmware
        run: npm run build:esp32

      - name: Save firmware gz
        run: cp dist/index.html.gz /tmp/index.html.gz

      - name: Build demo
        run: npm run build:demo

      - name: Add firmware to Pages output
        run: mkdir -p dist/firmware && cp /tmp/index.html.gz dist/firmware/index.html.gz

      - name: Tag version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          files: /tmp/index.html.gz
          generate_release_notes: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4
