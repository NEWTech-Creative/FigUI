name: Update Plugin Store

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build demo
        run: npm run build:demo

      - name: Preserve firmware from latest release
        run: |
          mkdir -p dist/firmware
          ASSET_URL=$(gh api repos/${{ github.repository }}/releases/latest \
            --jq '.assets[] | select(.name == "index.html.gz") | .browser_download_url' 2>/dev/null || echo "")
          if [ -n "$ASSET_URL" ]; then
            curl -fsSL "$ASSET_URL" -o dist/firmware/index.html.gz
            echo "Firmware preserved from latest release."
          else
            echo "No firmware release found, skipping."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4
